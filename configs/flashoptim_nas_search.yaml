# FlashOptim | Neural Architecture Search
# Usage: flashoptim nas --config configs/flashoptim_nas_search.yaml

# NAS configuration — fields must match NASConfig dataclass
nas:
  strategy: evolutionary
  population_size: 50
  generations: 30
  mutation_prob: 0.1
  crossover_prob: 0.5
  model_path: pretrained/model.pth
  # Constraints (part of NASConfig)
  max_flops: 1.0e9
  max_params: 5.0e6
  min_accuracy: 0.85
  target_latency_ms: 10.0

# NOTE: search_space is consumed directly by the NAS Searcher/SearchSpace
# classes, not by Config.from_yaml(). Pass it programmatically:
#   search_space:
#     channels: [16, 32, 64, 128, 256]
#     kernel_sizes: [3, 5, 7]
#     depths: [1, 2, 3, 4]
#     operations: ["conv", "dwconv", "mbconv", "skip"]

data:
  train_images: data/train
  val_images: data/val
  num_workers: 4
  batch_size: 64

# TrainingConfig uses 'epochs' (not proxy_epochs / full_epochs)
training:
  epochs: 100
  lr: 0.025
  optimizer: sgd
  scheduler: cosine
  warmup_epochs: 5

export:
  output: optimized/model_nas.onnx
  simplify: true
